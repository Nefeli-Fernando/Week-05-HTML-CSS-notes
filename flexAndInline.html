<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin:0;
            padding:0;
            font-family:sans-serif;
        }

        .flexibox {
            border: 2px solid rgb(27, 4, 21);
            display:flex;      /*inline-flex, This makes the child elements display inline instead of block,if you use flex without the inle part itll go to the next line*/

            justify-content:center;  /*This will align the child elements to the right side of the parent container*/

            justify-content:flex-start; /* Aligns flex elements on the main axis of the current line */
            justify-content:space-between; 
            justify-content:space-around;
            width:900px;
            flex-direction:column; /*This will change the direction of the flex elements to be vertical instead of horizontal aka instead of being a row*/
            flex-direction:row-reverse; /*This will change the direction of the flex elements to be horizontal but in reverse order*/

            justify-self:center; /*This will align the flex elements to the center of the parent container*/
        }

        .flexii{
            border: 2px solid black;
            display:flex;
            height:50px;
            align-items:baseline;
        }

                                        /* flex start will align the items to the top just as in default, but if u put flex-end, itll position itself to the bottom */

        .one, .two, .three, .four{
            padding:20px;
            text-align:center;
            font-size:36px;
            color:rgb(2, 14, 23);
            font-weight:bold;

        }

        .one{
            background-color:rgb(118, 230, 27);
            font-size:15x;
        }

        .two{
            background-color:rgb(46, 168, 229);
            font-size:50px;
        }

        .three{
            background-color:blue;
            font-size:33px;
        }

        .four{
            background-color:yellow;
            font-size:99px;
        }
        

    </style>
</head>
<body>

    <div class="flexibox">  <!--We normally add the flexbox to the parent as itll apply to its child values and then all will become inline instead of block elements-->
        <p class="one">What</p>
        <p class="two">Who</p>
        <p class="three">Where</p>
        <p class="four">When</p>

    </div>
            <div class="flexii"> 
                <p class="one">a</p>
                <p class="two">b</p>
                <p class="three">c</p>
                <p class="four">d</p>

    </div>
</body>
</html>
